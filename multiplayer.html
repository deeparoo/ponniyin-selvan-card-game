<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ponniyin Selvan: Multiplayer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Georgia', serif;
  background: #0b1a0b;
  background-image:
    radial-gradient(ellipse at 50% 50%, #102010 0%, #0b1508 60%, #050f05 100%);
  color: #f0ddb0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TABLE FELT TEXTURE ── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px),
    repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px);
}

/* ── SETUP SCREEN ── */
.setup-screen {
  position: relative; z-index: 1;
  max-width: 800px; margin: 0 auto; padding: 48px 24px;
  text-align: center;
}
.setup-screen h1 {
  font-size: 2.8em; color: #d4a017; letter-spacing: 0.05em;
  text-shadow: 0 0 32px #a0600090, 0 2px 4px #000;
  margin-bottom: 4px;
}
.subtitle { color: #b89050; margin: 4px 0; font-size: 0.95em; }
.game-design { color: #e0b860; margin: 16px 0 32px; font-style: italic; font-size: 1.05em; }

.setup-form {
  background: linear-gradient(160deg, #1a1205, #120d03);
  border: 1px solid #6b4010; border-radius: 14px;
  padding: 32px; margin: 0 auto 32px; text-align: left;
  box-shadow: 0 8px 32px #00000080, inset 0 1px 0 #6b401030;
}
.setup-option { margin: 16px 0; }
.setup-option label { color: #d4a850; font-size: 1.05em; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.setup-option select {
  background: #1a1005; color: #f0ddb0; border: 1px solid #6b4010;
  border-radius: 6px; padding: 8px 12px; font-size: 1em; margin-top: 8px; width: 100%;
  cursor: pointer;
}
.expansion-note { color: #8a6a30; font-size: 0.85em; margin-top: 6px; margin-left: 28px; }
.start-btn {
  display: block; width: 100%; padding: 18px;
  background: linear-gradient(135deg, #8b1a1a 0%, #5a0d0d 100%);
  color: #f0ddb0; border: 2px solid #d4a017;
  border-radius: 10px; font-size: 1.25em; font-family: 'Georgia', serif;
  cursor: pointer; margin-top: 28px; transition: all 0.2s;
  box-shadow: 0 4px 16px #00000080, 0 1px 0 #d4a01750;
  letter-spacing: 0.04em;
}
.start-btn:hover { background: linear-gradient(135deg, #a02020, #701010); transform: translateY(-2px); box-shadow: 0 8px 24px #00000090; }

.rules-summary {
  background: #0d0a02; border: 1px solid #3a2008;
  border-radius: 12px; padding: 28px; text-align: left;
  box-shadow: 0 4px 16px #00000060;
}
.rules-summary h2 { color: #d4a017; margin-bottom: 16px; font-size: 1.2em; }
.rules-summary li { margin: 10px 0 10px 20px; color: #c8a870; line-height: 1.6; font-size: 0.95em; }
.rules-summary strong { color: #e8d080; }

/* ── GAME LAYOUT ── */
.game-container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  min-height: 100vh; max-width: 1200px;
  margin: 0 auto; padding: 0 10px 12px;
}

.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 18px 10px;
  border-bottom: 1px solid #2a1804;
  background: linear-gradient(180deg, #0b1508 0%, #0b150890 100%);
  position: sticky; top: 0; z-index: 20;
  backdrop-filter: blur(4px);
}
.header h1 { color: #d4a017; font-size: 1.2em; letter-spacing: 0.03em; text-shadow: 0 0 12px #a0600060; }
.turn-indicator { color: #b89050; font-size: 0.9em; }
.turn-indicator strong { color: #f0d060; }

.main-area { display: flex; flex-direction: column; gap: 8px; padding-top: 8px; flex: 1; }

/* ── OPPONENTS ROW ── */
.opponents-row {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 4px 0;
}

.opponent-area {
  background: linear-gradient(160deg, #112011 0%, #0a180a 100%);
  border: 1px solid #2a4020; border-radius: 12px;
  padding: 10px 14px; min-width: 150px; flex: 1; max-width: 200px;
  position: relative; transition: border-color 0.3s, box-shadow 0.3s;
}
.opponent-area.current-turn {
  border-color: #d4a017;
  box-shadow: 0 0 16px #d4a01740, inset 0 0 12px #d4a01710;
}
.opponent-area.eliminated { opacity: 0.4; }

.opp-name { color: #b8c890; font-weight: bold; margin-bottom: 3px; font-size: 0.9em; }
.opp-coins { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
.opp-cards { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── COIN DISPLAY ── */
.coin-stack { display: flex; align-items: center; gap: 4px; }
.coin {
  width: 20px; height: 20px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffd700, #b8860b);
  border: 1.5px solid #806000; box-shadow: 0 1px 3px #00000080, inset 0 1px 0 #ffd70060;
  display: inline-block; flex-shrink: 0;
}
.coin-count { color: #f0d060; font-size: 0.85em; font-weight: bold; }
.coin-lg {
  width: 28px; height: 28px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffd700, #b8860b);
  border: 2px solid #806000; box-shadow: 0 2px 6px #00000080, inset 0 1px 0 #ffd70080;
  display: inline-block; flex-shrink: 0;
}

.coins-display { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.coins-display .coin-row { display: flex; gap: 3px; flex-wrap: wrap; }

/* ── CARD BACK ── */
.card-back {
  width: 52px; height: 74px; border-radius: 7px;
  background: linear-gradient(160deg, #1a2820, #0f1f14);
  border: 2px solid #2a4028;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4em; box-shadow: 2px 2px 6px #00000080;
  position: relative; overflow: hidden;
}
.card-back::before {
  content: 'ப ச';
  position: absolute; font-size: 0.5em; color: #2a4028;
  letter-spacing: 2px; transform: rotate(-30deg);
  white-space: nowrap; opacity: 0.6;
}

/* ── PORTRAIT CARD (human's face-up card) ── */
.portrait-card {
  width: 120px; border-radius: 10px;
  border: 2px solid #5a3010;
  background: #0d0a04;
  box-shadow: 3px 3px 12px #00000090, inset 0 0 0 1px #8b601020;
  overflow: hidden; cursor: default;
  transition: transform 0.15s, box-shadow 0.15s;
  flex-shrink: 0; position: relative;
}
.portrait-card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 4px 8px 20px #00000090; }
.portrait-card img {
  width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
}
/* name badge sits at the bottom of the image */
.portrait-card .card-name-badge {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.55) 70%, transparent 100%);
  padding: 18px 6px 6px;
  text-align: center;
}
.portrait-card .card-name-badge span {
  color: #f0d878; font-size: 0.72em; font-weight: bold;
  text-shadow: 0 1px 3px #000, 0 0 8px #000;
  line-height: 1.2; display: block;
}

/* highlight when losing a card */
.portrait-card.lose-target { border-color: #cc2020; cursor: pointer; }
.portrait-card.lose-target:hover { box-shadow: 0 0 16px #cc202080; }

/* ── MIDDLE SECTION ── */
.middle-section {
  display: flex; gap: 8px; align-items: flex-start;
}

.game-info {
  min-width: 130px; background: #080f08; border: 1px solid #1a2814;
  border-radius: 10px; padding: 10px 12px; font-size: 0.78em;
}
.game-info div { margin: 3px 0; color: #6a8a50; }
.game-info .info-val { color: #90b060; }

.game-log {
  flex: 1; background: #080e08; border: 1px solid #1a2814;
  border-radius: 10px; padding: 10px 14px; max-height: 160px; overflow-y: auto;
}
.log-entry { font-size: 0.82em; padding: 2px 0 3px; border-bottom: 1px solid #1a180600; color: #b0a870; line-height: 1.4; }
.log-entry:first-child { color: #e8d080; font-weight: bold; }
.log-info { color: #b0a870; }
.log-loss { color: #e06040; }
.log-elimination { color: #ff5040; font-weight: bold; }
.log-victory { color: #ffd700; font-weight: bold; font-size: 1.05em; }
.log-warning { color: #ff8c00; }

/* ── HUMAN SECTION ── */
.human-section {
  background: linear-gradient(160deg, #1a1205, #110d03);
  border: 2px solid #4a2a0a; border-radius: 14px;
  padding: 14px 16px;
  box-shadow: 0 4px 16px #00000060, inset 0 1px 0 #6b401020;
}
.human-header { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
.human-name { color: #f0c040; font-size: 1.1em; font-weight: bold; }
.turn-badge {
  background: linear-gradient(135deg, #3a2000, #2a1600);
  border: 1px solid #d4a017; border-radius: 20px;
  padding: 3px 12px; font-size: 0.78em; color: #f0d060;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { box-shadow: 0 0 4px #d4a01740; } 50% { box-shadow: 0 0 12px #d4a01780; } }

.human-cards-row { display: flex; gap: 14px; flex-wrap: wrap; }

/* ── ACTION AREA ── */
.action-area { border-top: 1px solid #2a1804; padding-top: 14px; margin-top: 12px; }
.action-area.waiting { color: #6a5030; font-style: italic; text-align: center; padding: 16px 20px; }
.action-group { margin-bottom: 14px; }
.action-group h3 { color: #b89050; font-size: 0.88em; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.action-buttons { display: flex; flex-wrap: wrap; gap: 7px; }

.action-btn {
  padding: 8px 13px; border-radius: 7px;
  border: 1px solid #5a3010; background: linear-gradient(160deg, #2a1505, #1e0f03);
  color: #e0c070; cursor: pointer; font-family: 'Georgia', serif;
  font-size: 0.86em; transition: all 0.15s; text-align: left;
  box-shadow: 0 2px 4px #00000060;
}
.action-btn:hover:not(:disabled) {
  background: linear-gradient(160deg, #3a2008, #2a1505);
  border-color: #d4a017; color: #f0d878; transform: translateY(-1px);
  box-shadow: 0 4px 8px #00000080;
}
.action-btn:disabled, .disabled-btn { opacity: 0.35; cursor: not-allowed; }

.card-action-btn { border-color: #3a5020; color: #a8d060; background: linear-gradient(160deg, #141f08, #0e1605); }
.card-action-btn:hover:not(:disabled) { background: linear-gradient(160deg, #1e2e0c, #141f08); border-color: #80b040; }
.target-btn { border-color: #503010; background: linear-gradient(160deg, #1e1005, #150b03); }
.target-btn:hover { background: linear-gradient(160deg, #2e1a08, #1e1005) !important; border-color: #e08040 !important; }
.question-btn { border-color: #8b0000; color: #ff8080; background: linear-gradient(160deg, #200000, #150000); }
.question-btn:hover { background: linear-gradient(160deg, #300000, #200000) !important; border-color: #ff4040 !important; }
.block-btn { border-color: #00508b; color: #80c0ff; background: linear-gradient(160deg, #001828, #001020); }
.block-btn:hover { background: linear-gradient(160deg, #002038, #001828) !important; border-color: #40a0ff !important; }
.pass-btn { border-color: #405020; color: #90b060; background: linear-gradient(160deg, #0d1a05, #0a1203); }
.accept-btn { border-color: #405020; color: #90b060; }
.cancel-btn { border-color: #505050; color: #909090; background: #101010; }
.lose-card-btn { border-color: #8b0000; background: linear-gradient(160deg, #1a0000, #100000); color: #ff9090; }
.lose-card-btn:hover { background: linear-gradient(160deg, #250000, #180000) !important; }

.response-area h3 { color: #e0b060; margin-bottom: 8px; font-size: 0.95em; }
.warning-msg { color: #ff8c00; background: #1a0e00; border: 1px solid #804000;
  padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-weight: bold; font-size: 0.9em; }
.guess-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.guess-btn { font-size: 0.82em; padding: 6px 10px; }
.card-checkbox { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  background: #0e1205; border: 1px solid #2a3010; border-radius: 6px;
  cursor: pointer; color: #b0a860; margin: 4px 0; font-size: 0.88em; }
.card-checkbox input { width: 16px; height: 16px; cursor: pointer; }

/* ── CHAR REFERENCE ── */
.char-ref-toggle {
  font-size: 0.78em; color: #6a5a30; cursor: pointer; padding: 4px 10px;
  border: 1px solid #2a1804; border-radius: 4px; background: none; float: right; margin-top: 2px;
}
.char-ref-toggle:hover { color: #b89050; border-color: #5a3010; }
.char-ref-panel {
  background: #0a0e04; border: 1px solid #2a2810; border-radius: 8px;
  padding: 12px; margin-top: 8px; font-size: 0.8em;
  display: none; clear: both;
}
.char-ref-panel.visible { display: block; }
.char-ref-row { display: flex; gap: 4px; margin: 5px 0; flex-wrap: wrap; align-items: baseline; }
.char-ref-name { color: #d4a850; font-weight: bold; min-width: 170px; }
.char-ref-action { color: #90b858; flex: 1; }
.char-ref-counter { color: #5890b8; flex: 1; }
.char-ref-count { color: #5a4030; min-width: 40px; }

/* ── GAME OVER ── */
.game-over { max-width: 640px; margin: 80px auto; text-align: center; padding: 24px; position: relative; z-index: 1; }
.game-over h1 { color: #d4a017; font-size: 2em; margin-bottom: 28px; text-shadow: 0 0 20px #a0600070; }
.victory-banner {
  background: linear-gradient(135deg, #181000, #221800);
  border: 2px solid #d4a017; border-radius: 18px;
  padding: 36px; margin: 20px 0 36px;
  box-shadow: 0 0 40px #d4a01730;
}
.victory-banner h2 { color: #ffd700; font-size: 1.9em; margin-bottom: 12px; text-shadow: 0 0 16px #ffd70060; }
.victory-banner p { color: #b89050; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #080e08; }
::-webkit-scrollbar-thumb { background: #2a3818; border-radius: 3px; }

/* ── RANGE INPUT ── */
input[type=range] { accent-color: #d4a017; }
</style>
<style>
/* ── MULTIPLAYER EXTRA STYLES ── */
.mp-screen { display: none; }
.mp-screen.active { display: block; }

.lobby-screen {
  position: relative; z-index: 1;
  max-width: 600px; margin: 0 auto; padding: 48px 24px;
  text-align: center;
}
.landing-screen {
  position: relative; z-index: 1;
  max-width: 600px; margin: 0 auto; padding: 48px 24px;
  text-align: center;
}
.mp-form-box {
  background: linear-gradient(160deg, #1a1205, #120d03);
  border: 1px solid #6b4010; border-radius: 14px;
  padding: 28px; margin: 0 auto 24px; text-align: left;
  box-shadow: 0 8px 32px #00000080, inset 0 1px 0 #6b401030;
}
.mp-input {
  background: #0e0a02; color: #f0ddb0; border: 1px solid #6b4010;
  border-radius: 6px; padding: 10px 14px; font-size: 1em;
  width: 100%; font-family: Georgia, serif; margin-top: 6px;
  outline: none;
}
.mp-input:focus { border-color: #d4a017; }
.mp-label { color: #d4a850; font-size: 1em; display: block; margin-bottom: 4px; margin-top: 14px; }
.mp-btn {
  display: inline-block; padding: 12px 28px;
  background: linear-gradient(135deg, #8b1a1a 0%, #5a0d0d 100%);
  color: #f0ddb0; border: 2px solid #d4a017;
  border-radius: 10px; font-size: 1.0em; font-family: Georgia, serif;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
  box-shadow: 0 4px 12px #00000060;
}
.mp-btn:hover:not(:disabled) { background: linear-gradient(135deg, #a02020, #701010); transform: translateY(-1px); }
.mp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.mp-btn-secondary {
  background: linear-gradient(135deg, #1a2a1a, #0e1a0e);
  border-color: #4a6a30;
}
.mp-btn-secondary:hover:not(:disabled) { background: linear-gradient(135deg, #2a3a2a, #1a2a1a); }

.room-code-display {
  font-size: 2.2em; font-family: 'Courier New', monospace;
  color: #ffd700; letter-spacing: 0.25em;
  background: #0d0a02; border: 2px solid #6b4010;
  border-radius: 10px; padding: 16px 28px; display: inline-block;
  margin: 12px 0; text-shadow: 0 0 20px #ffd70060;
}
.player-list { list-style: none; margin: 16px 0; text-align: left; }
.player-list li {
  padding: 9px 14px; margin: 5px 0;
  background: #0e1205; border: 1px solid #2a3010; border-radius: 7px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.95em; color: #c8d890;
}
.ready-badge {
  font-size: 0.75em; padding: 3px 10px; border-radius: 12px;
  font-weight: bold;
}
.ready-yes { background: #0a2a0a; color: #60d060; border: 1px solid #30a030; }
.ready-no { background: #1a1000; color: #c08020; border: 1px solid #806010; }
.host-badge { color: #ffd700; font-size: 0.75em; margin-left: 6px; }

.waiting-spinner {
  display: inline-block; width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid #4a6a30; border-top-color: #90c060;
  animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.waiting-msg {
  color: #7a9a50; font-style: italic; text-align: center;
  padding: 20px; font-size: 0.95em;
}

.mp-error { color: #ff7070; background: #1a0000; border: 1px solid #6a0000;
  padding: 10px 14px; border-radius: 7px; margin: 10px 0; font-size: 0.9em; }
.mp-info { color: #90c070; background: #0a1a05; border: 1px solid #30600a;
  padding: 10px 14px; border-radius: 7px; margin: 10px 0; font-size: 0.9em; }

.share-link { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
.share-link input { flex: 1; }

.timer-bar {
  color: #ff8c00; font-weight: bold; font-size: 0.9em;
  background: #1a0800; border: 1px solid #804000;
  padding: 6px 12px; border-radius: 6px; margin-bottom: 8px;
  display: inline-block;
}

/* Multiplayer game layout adjustments */
.mp-game-container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  min-height: 100vh; max-width: 1200px;
  margin: 0 auto; padding: 0 10px 12px;
}
.join-input-row { display: flex; gap: 8px; align-items: flex-end; margin-top: 10px; flex-wrap: wrap; }
.join-input-row .mp-input { width: auto; flex: 1; min-width: 120px; }
</style>
</head>
<body>
<div id="app">
  <!-- Landing screen -->
  <div id="screen-landing" class="mp-screen active landing-screen">
    <h1 style="font-size:2.4em;color:#d4a017;letter-spacing:0.05em;text-shadow:0 0 32px #a0600090,0 2px 4px #000;margin-bottom:4px">Ponniyin Selvan</h1>
    <div style="color:#b89050;margin:4px 0;font-size:0.95em">The Card Game — Multiplayer</div>
    <div style="color:#e0b860;margin:16px 0 28px;font-style:italic;font-size:1.0em">Play with friends online</div>

    <div class="mp-form-box">
      <label class="mp-label" for="player-name-input">Your Name</label>
      <input class="mp-input" id="player-name-input" type="text" maxlength="20" placeholder="Enter your name…" autocomplete="off">

      <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        <button class="mp-btn" onclick="createRoom()">Create Room</button>
        <button class="mp-btn mp-btn-secondary" onclick="showJoinForm()">Join Room</button>
      </div>

      <div id="join-form" style="display:none;margin-top:16px">
        <label class="mp-label" for="room-code-input">Room Code</label>
        <div class="join-input-row">
          <input class="mp-input" id="room-code-input" type="text" maxlength="6"
            placeholder="Enter 6-letter code" autocomplete="off"
            style="text-transform:uppercase;letter-spacing:0.15em">
          <button class="mp-btn" onclick="joinRoom()">Join</button>
        </div>
      </div>

      <div id="landing-error" class="mp-error" style="display:none"></div>
    </div>

    <div style="margin-top:16px">
      <a href="/" style="color:#6a5030;font-size:0.9em;text-decoration:none">← Back to Single Player</a>
    </div>
  </div>

  <!-- Lobby screen -->
  <div id="screen-lobby" class="mp-screen lobby-screen">
    <h1 style="font-size:2.0em;color:#d4a017;letter-spacing:0.05em;text-shadow:0 0 20px #a0600060;margin-bottom:8px">Ponniyin Selvan</h1>
    <div style="color:#b89050;margin-bottom:20px;font-size:0.9em">Waiting for players…</div>

    <div class="mp-form-box">
      <div style="text-align:center;margin-bottom:8px">
        <div style="color:#b89050;font-size:0.9em;margin-bottom:4px">Room Code</div>
        <div class="room-code-display" id="lobby-code">------</div>
      </div>
      <div class="share-link">

function getAllChars(includeExpansion) {
  return includeExpansion ? {...BASE_CHARS, ...EXPANSION_CHARS} : {...BASE_CHARS};
}
function getCharName(charId, includeExpansion) {
  if (!charId || charId === '??') return '?';
  return getAllChars(includeExpansion)[charId]?.shortName || charId;
}

const NON_QUESTIONABLE = new Set(['INCOME','REPLACE_CARD','COUP']);
const NON_BLOCKABLE = new Set(['INCOME','REPLACE_CARD','COUP','KUNDAVAI_COINS','DRAW2']);

function getBlockersFor(actionType, targetSeatIndex, blockingSeatIndex, targetPlayerId, blockingPlayerId, includeExpansion) {
  const chars = getAllChars(includeExpansion);
  return Object.values(chars).filter(ch => {
    if (!ch.counter) return false;
    if (!ch.counter.blocks.includes(actionType)) return false;
    if (ch.counter.selfOnly && targetPlayerId && blockingPlayerId !== targetPlayerId) return false;
    return true;
  }).map(ch => ch.id);
}

// ══════════════════════════════════════════
let myPlayerId = null;
let mySeatIndex = null;
let myRoomCode = null;
let isHost = false;
let isReady = false;
let pollInterval = null;
let lastVersion = -1;
let currentGameState = null;
let pendingTargetAction = null; // { actionType, charId, needsExtra }
let pendingTargetForExtra = null; // { actionType, charId, targetSeatIndex }

// ══════════════════════════════════════════
// UUID GENERATOR
// ══════════════════════════════════════════
function generateId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ══════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.mp-screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════════════════════
// LANDING
// ══════════════════════════════════════════
function getPlayerName() {
  const name = document.getElementById('player-name-input').value.trim();
  return name;
}

function ensurePlayerId() {
  let id = localStorage.getItem('ps_player_id_global');
  if (!id) { id = generateId(); localStorage.setItem('ps_player_id_global', id); }
  return id;
}

function showJoinForm() {
  const jf = document.getElementById('join-form');
  jf.style.display = jf.style.display === 'none' ? 'block' : 'none';
}

function showLandingError(msg) {
  const el = document.getElementById('landing-error');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function createRoom() {
  const name = getPlayerName();
  if (!name) { showLandingError('Please enter your name.'); return; }
  myPlayerId = ensurePlayerId();
  localStorage.setItem('ps_player_name', name);

  try {
    const res = await fetch('/api/rooms/create', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ playerName: name, playerId: myPlayerId, includeExpansion: false })
    });
    const data = await res.json();
    if (!res.ok) { showLandingError(data.error || 'Failed to create room'); return; }
    myRoomCode = data.roomCode;
    mySeatIndex = data.seatIndex;
    isHost = true;
    localStorage.setItem('ps_player_id_' + myRoomCode, myPlayerId);
    localStorage.setItem('ps_seat_index_' + myRoomCode, mySeatIndex);
    enterLobby();
  } catch(e) {
    showLandingError('Network error: ' + e.message);
  }
}

async function joinRoom() {
  const name = getPlayerName();
  if (!name) { showLandingError('Please enter your name.'); return; }
  const code = document.getElementById('room-code-input').value.trim().toUpperCase();
  if (code.length !== 6) { showLandingError('Please enter a valid 6-character room code.'); return; }
  myPlayerId = ensurePlayerId();
  localStorage.setItem('ps_player_name', name);

  try {
    const res = await fetch('/api/rooms/join', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ roomCode: code, playerName: name, playerId: myPlayerId })
    });
    const data = await res.json();
    if (!res.ok) { showLandingError(data.error || 'Failed to join room'); return; }
    myRoomCode = data.roomCode;
    mySeatIndex = data.seatIndex;
    isHost = data.isHost;
    localStorage.setItem('ps_player_id_' + myRoomCode, myPlayerId);
    localStorage.setItem('ps_seat_index_' + myRoomCode, mySeatIndex);
    enterLobby();
  } catch(e) {
    showLandingError('Network error: ' + e.message);
  }
}

// ══════════════════════════════════════════
// LOBBY
// ══════════════════════════════════════════
function enterLobby() {
  showScreen('screen-lobby');
  document.getElementById('lobby-code').textContent = myRoomCode;
  const shareUrl = window.location.origin + '/multiplayer?room=' + myRoomCode;
  document.getElementById('share-link-input').value = shareUrl;
  if (isHost) {
    document.getElementById('start-btn').style.display = 'inline-block';
    document.getElementById('expansion-toggle').style.display = 'block';
  }
  startLobbyPoll();
}

function copyLink() {
  const input = document.getElementById('share-link-input');
  input.select();
  document.execCommand('copy');
  showLobbyInfo('Link copied!');
  setTimeout(() => showLobbyInfo(''), 2000);
}

function showLobbyInfo(msg) {
  const el = document.getElementById('lobby-info');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
function showLobbyError(msg) {
  const el = document.getElementById('lobby-error');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function startLobbyPoll() {
  if (pollInterval) clearInterval(pollInterval);
  pollLobby();
  pollInterval = setInterval(pollLobby, 2000);
}

async function pollLobby() {
  if (!myRoomCode) return;
  try {
    const res = await fetch('/api/rooms/status?roomCode=' + myRoomCode + '&playerId=' + myPlayerId);
    const data = await res.json();
    if (!res.ok) { showLobbyError(data.error || 'Room error'); return; }
    renderLobby(data);
    if (data.status === 'PLAYING') {
      clearInterval(pollInterval);
      enterGame();
    }
  } catch(e) {
    // ignore transient network errors
  }
}

function renderLobby(data) {
  const list = document.getElementById('lobby-player-list');
  document.getElementById('lobby-player-count').textContent = data.players.length;
  list.innerHTML = data.players.map(p => {
    const isMe = p.id === myPlayerId;
    return '<li>' +
      '<span>' + escHtml(p.name) + (isMe ? ' <em style="color:#7a9a50;font-size:0.8em">(you)</em>' : '') +
        (p.id === data.hostPlayerId ? '<span class="host-badge">★ Host</span>' : '') +
      '</span>' +
      '<span class="ready-badge ' + (p.isReady ? 'ready-yes' : 'ready-no') + '">' +
        (p.isReady ? '✓ Ready' : 'Not Ready') + '</span>' +
    '</li>';
  }).join('');
  // Update ready button
  const myPlayer = data.players.find(p => p.id === myPlayerId);
  isReady = myPlayer ? myPlayer.isReady : false;
  const readyBtn = document.getElementById('ready-btn');
  readyBtn.textContent = isReady ? 'Unready' : 'Mark Ready';
  // Start button: enabled when 2+ players and all are ready
  if (isHost) {
    const startBtn = document.getElementById('start-btn');
    const allReady = data.players.length >= 2 && data.players.every(p => p.isReady);
    startBtn.disabled = !allReady;
    startBtn.title = !allReady ? 'All players must be ready (min 2)' : '';
  }
}

async function toggleReady() {
  const newReady = !isReady;
  try {
    await fetch('/api/rooms/ready', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ roomCode: myRoomCode, playerId: myPlayerId, ready: newReady })
    });
    isReady = newReady;
    document.getElementById('ready-btn').textContent = isReady ? 'Unready' : 'Mark Ready';
  } catch(e) {}
}

async function updateExpansion() {
  // Host can update expansion setting before game starts
  // For now just tracked locally; passed at game start
}

async function startGame() {
  const includeExpansion = document.getElementById('expansion-check')?.checked || false;
  // First update room expansion setting
  try {
    // Update expansion (if we had an endpoint for it; for now we pass it on start)
    const res = await fetch('/api/rooms/start', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ roomCode: myRoomCode, playerId: myPlayerId })
    });
    const data = await res.json();
    if (!res.ok) { showLobbyError(data.error || 'Failed to start game'); return; }
    // Game started - poll will detect PLAYING status
  } catch(e) {
    showLobbyError('Network error: ' + e.message);
  }
}

// ══════════════════════════════════════════
// GAME
// ══════════════════════════════════════════
function enterGame() {
  showScreen('screen-game');
  startGamePoll();
}

function startGamePoll() {
  if (pollInterval) clearInterval(pollInterval);
  pollGameState();
  pollInterval = setInterval(pollGameState, 2000);
}

async function pollGameState() {
  if (!myRoomCode) return;
  try {
    const res = await fetch('/api/game/state?roomCode=' + myRoomCode + '&playerId=' + myPlayerId);
    const data = await res.json();
    if (!res.ok) return;
    if (data.version !== lastVersion) {
      lastVersion = data.version;
      currentGameState = data;
      renderGame(data);
    }
  } catch(e) {}
}

// ══════════════════════════════════════════
// GAME RENDERING
// ══════════════════════════════════════════
function renderGame(G) {
  if (!G) return;
  const turnPlayer = G.players.find(p => p.seatIndex === G.currentPlayerIdx);
  document.getElementById('mp-turn-indicator').innerHTML =
    'Turn: <strong>' + escHtml(turnPlayer?.name || '?') + '</strong>' +
    ' &nbsp;|&nbsp; Deck: ' + G.deckSize +
    ' &nbsp;|&nbsp; Discarded: ' + G.eliminatedCount;

  if (G.phase === 'GAME_OVER') {
    renderGameOver(G);
    return;
  }

  const myPlayer = G.players.find(p => p.seatIndex === mySeatIndex);
  const opponents = G.players.filter(p => p.seatIndex !== mySeatIndex);

  let html = '';

  // Opponents row
  html += '<div class="opponents-row">';
  for (const p of opponents) {
    html += renderOpponent(p, G);
  }
  html += '</div>';

  // Log + deck info
  html += '<div class="middle-section">';
  html += '<div class="game-info">';
  html += '<div>Deck: <span class="info-val">' + G.deckSize + '</span></div>';
  html += '<div>Discarded: <span class="info-val">' + G.eliminatedCount + '</span></div>';
  html += '<div>Players: <span class="info-val">' + G.players.filter(p=>p.alive).length + ' alive</span></div>';
  html += '</div>';
  html += '<div class="game-log">';
  html += (G.log || []).slice(0, 8).map(l =>
    '<div class="log-entry log-' + (l.type||'info') + '">' + escHtml(l.msg) + '</div>'
  ).join('');
  html += '</div>';
  html += '</div>';

  // My section
  if (myPlayer) {
    const isCurr = G.currentPlayerIdx === mySeatIndex;
    html += '<div class="human-section">';
    html += '<div class="human-header">';
    html += '<span class="human-name">' + escHtml(myPlayer.name) + ' (You)</span>';
    if (isCurr) html += '<span class="turn-badge">YOUR TURN</span>';
    html += renderCoins(myPlayer.coins, true);
    html += '</div>';
    html += '<div class="human-cards-row">';
    if (myPlayer.alive) {
      html += myPlayer.cards.map(card => renderPortraitCard(card, G.includeExpansion)).join('');
    } else {
      html += '<span style="color:#ff5040;font-weight:bold;font-size:1.1em;align-self:center">ELIMINATED</span>';
    }
    html += '</div>';
    html += renderActionArea(G, myPlayer);
    html += '</div>';
  }

  document.getElementById('mp-main-area').innerHTML = html;
}

function renderOpponent(p, G) {
  const isCurrent = G.currentPlayerIdx === p.seatIndex;
  const isAwaitingThis = G.awaitingResponseFrom === p.seatIndex;
  return '<div class="opponent-area ' + (isCurrent ? 'current-turn' : '') + ' ' + (!p.alive ? 'eliminated' : '') + '">' +
    '<div class="opp-name">' + escHtml(p.name) +
      (!p.alive ? ' ✝' : '') +
      (isCurrent ? ' ◀' : '') +
      (isAwaitingThis ? ' <span style="color:#e0a060;font-size:0.75em">(responding…)</span>' : '') +
    '</div>' +
    '<div class="opp-coins"><span class="coin"></span><span class="coin-count">' + p.coins + '</span><span style="color:#4a6a40;font-size:0.75em;margin-left:2px">coins</span></div>' +
    '<div class="opp-cards">' +
      Array(p.cardCount).fill('<div class="card-back">☽</div>').join('') +
    '</div>' +
  '</div>';
}

function renderPortraitCard(card, includeExpansion, options) {
  options = options || {};
  const ch = getAllChars(includeExpansion)[card.charId];
  const img = CHAR_IMGS[card.charId] || '';
  const extraClass = options.loseTarget ? 'lose-target' : '';
  const onclick = options.onClickFn ? 'onclick="' + options.onClickFn + '"' : '';
  const imgHtml = img
    ? '<img src="' + img + '" alt="' + escHtml(ch?.shortName || card.charId) + '" loading="lazy">'
    : '<div style="width:100%;aspect-ratio:3/4;background:#1a1205;display:flex;align-items:center;justify-content:center;color:#5a3010;font-size:2em;">?</div>';
  return '<div class="portrait-card ' + extraClass + '" style="border-color:' + (ch?.color || '#5a3010') + '" ' + onclick + '>' +
    imgHtml +
    '<div class="card-name-badge"><span>' + escHtml(ch?.shortName || card.charId) + '</span></div>' +
  '</div>';
}

function renderCoins(count, large) {
  const cls = large ? 'coin-lg' : 'coin';
  const max = large ? 10 : 8;
  const shown = Math.min(count, max);
  let html = '<div class="coins-display"><div class="coin-row">';
  for (let i = 0; i < shown; i++) html += '<span class="' + cls + '"></span>';
  if (count > max) html += '<span style="color:#f0d060;font-size:0.75em;align-self:center"> +' + (count-max) + '</span>';
  html += '</div><span class="coin-count">' + count + '</span></div>';
  return html;
}

// ══════════════════════════════════════════
// ACTION AREA RENDERING
// ══════════════════════════════════════════
function renderActionArea(G, myPlayer) {
  if (!myPlayer.alive) {
    return '<div class="action-area waiting">You have been eliminated from the court.</div>';
  }

  const phase = G.phase;
  const pa = G.pendingAction;

  // Response deadline timer
  let timerHtml = '';
  if (G.responseDeadline) {
    const secs = Math.max(0, Math.ceil((new Date(G.responseDeadline) - Date.now()) / 1000));
    timerHtml = '<div class="timer-bar">⏱ Response required in ' + secs + 's</div>';
  }

  // FORCE_ELIMINATE
  if (phase === 'FORCE_ELIMINATE') {
    if (G.currentPlayerIdx !== mySeatIndex) {
      return '<div class="action-area waiting">' + timerHtml + '<span class="waiting-spinner"></span>Waiting for ' + escHtml(getCurrentPlayerName(G)) + '…</div>';
    }
    return renderForceEliminate(G);
  }

  // ACTION_SELECT
  if (phase === 'ACTION_SELECT') {
    if (G.currentPlayerIdx !== mySeatIndex) {
      return '<div class="action-area waiting">' + timerHtml + '<span class="waiting-spinner"></span>Waiting for ' + escHtml(getCurrentPlayerName(G)) + '…</div>';
    }
    return renderActionSelect(G, myPlayer);
  }

  // TARGET_SELECT (frontend phase, no server phase)
  if (phase === 'TARGET_SELECT_UI') {
    return renderTargetSelectUI(G, myPlayer);
  }

  // GUESS_SELECT
  if (phase === 'GUESS_SELECT') {
    if (!pa || pa.actingPlayerId !== mySeatIndex) {
      return '<div class="action-area waiting">' + timerHtml + '<span class="waiting-spinner"></span>Waiting for ' + escHtml(getActingPlayerName(G)) + '…</div>';
    }
    return renderGuessSelect(G);
  }

  // GIVE_COINS_SELECT
  if (phase === 'GIVE_COINS_SELECT') {
    if (!pa || pa.actingPlayerId !== mySeatIndex) {
      return '<div class="action-area waiting">' + timerHtml + '<span class="waiting-spinner"></span>Waiting…</div>';
    }
    return renderGiveCoinsSelect(G, myPlayer);
  }

  // HUMAN_RESPONSE
  if (phase === 'HUMAN_RESPONSE') {
    if (G.awaitingResponseFrom !== mySeatIndex) {
      const name = G.awaitingResponseFrom != null ? (G.players.find(p=>p.seatIndex===G.awaitingResponseFrom)?.name || '?') : '?';
      return '<div class="action-area waiting">' + timerHtml + '<span class="waiting-spinner"></span>Waiting for ' + escHtml(name) + ' to respond…</div>';
    }
    return timerHtml + renderHumanResponseArea(G, myPlayer);
  }

  // ACTIVE_QUESTION_BLOCK
  if (phase === 'ACTIVE_QUESTION_BLOCK') {
    if (!pa || pa.actingPlayerId !== mySeatIndex) {
      return '<div class="action-area waiting">' + timerHtml + '<span class="waiting-spinner"></span>Waiting for ' + escHtml(getActingPlayerName(G)) + ' to decide on block…</div>';
    }
    return timerHtml + renderQuestionBlockArea(G);
  }

  // LOSE_CARD_SELECT
  if (phase === 'LOSE_CARD_SELECT') {
    if (!pa || pa.lossTarget !== mySeatIndex) {
      const target = pa ? G.players.find(p=>p.seatIndex===pa.lossTarget) : null;
      return '<div class="action-area waiting">' + timerHtml + '<span class="waiting-spinner"></span>Waiting for ' + escHtml(target?.name || '?') + ' to choose a card to lose…</div>';
    }
    return timerHtml + renderLoseCardSelect(G, myPlayer);
  }

  // CARD_EXCHANGE_SELECT
  if (phase === 'CARD_EXCHANGE_SELECT') {
    if (G.currentPlayerIdx !== mySeatIndex) {
      return '<div class="action-area waiting">' + timerHtml + '<span class="waiting-spinner"></span>Waiting for ' + escHtml(getCurrentPlayerName(G)) + ' to choose cards…</div>';
    }
    return timerHtml + renderCardExchangeSelect(G, myPlayer);
  }

  return '<div class="action-area waiting">' + timerHtml + '<span class="waiting-spinner"></span>Resolving…</div>';
}

function getCurrentPlayerName(G) {
  return G.players.find(p => p.seatIndex === G.currentPlayerIdx)?.name || '?';
}
function getActingPlayerName(G) {
  return G.players.find(p => p.seatIndex === G.pendingAction?.actingPlayerId)?.name || '?';
}

  return '<div class="action-area">' +
    '<div class="action-group"><h3>Common Actions</h3><div class="action-buttons">' +
    '<button class="action-btn" onclick="submitAction(\'INCOME\')">Income (+1 coin)</button>' +
    '<button class="action-btn" onclick="submitAction(\'GIFT\')">Gift (+2 coins, can be blocked)</button>' +
    (myPlayer.coins >= 10 ? '<button class="action-btn" style="border-color:#d4a017;color:#ffd700" onclick="selectTarget(\'COUP\',null)">Coup — pay 10 coins [target]</button>' : '') +
    (canReplace ? '<button class="action-btn" onclick="submitAction(\'REPLACE_CARD\')">Replace Card (costs 8 coins)</button>' : '') +
    '</div></div>' +
    '<div class="action-group"><h3>Character Actions <span style="color:#5a5a3a;font-size:0.82em;text-transform:none;letter-spacing:0">(bluffing is allowed)</span></h3><div class="action-buttons">' +
    '<button class="action-btn card-action-btn" onclick="submitAction(\'TAX\')">Periya Pazhuvettarayar — Tax (+3 coins)</button>' +
    '<button class="action-btn card-action-btn" onclick="submitAction(\'KUNDAVAI_COINS\')">Kundavai — Treasury Gift (+2 coins)</button>' +
    '<button class="action-btn card-action-btn" onclick="submitAction(\'DRAW2\')">Arulmozhivarman — Recruit (draw 2, keep 2)</button>' +
    '<button class="action-btn card-action-btn" onclick="selectTarget(\'STEAL\',\'NANDINI\')">Nandini — Steal (2 coins from target)</button>' +
    '<button class="action-btn card-action-btn ' + (myPlayer.coins < 4 ? 'disabled-btn' : '') + '" ' + (myPlayer.coins < 4 ? 'disabled' : '') + ' onclick="selectTarget(\'ASSASSINATE\',\'RAVID\')">Ravidasan — Assassinate (costs 4 coins) [target]</button>' +
    '<button class="action-btn card-action-btn" onclick="selectTarget(\'SPY\',\'AAZHWAR\')">Aazhwarkadiyan — Spy [target]</button>' +
    '<button class="action-btn card-action-btn" onclick="selectTarget(\'GUESS\',\'VANTHI\')">Vanthiyathevan — Gamble (guess a card) [target]</button>' +
    '<button class="action-btn card-action-btn" onclick="selectTarget(\'KANDAMARAN_EXCHANGE\',\'KANDA\')">Kandamaran — Force card swap [target]</button>' +
    (exp ? '<button class="action-btn card-action-btn ' + (myPlayer.coins < 2 ? 'disabled-btn' : '') + '" ' + (myPlayer.coins < 2 ? 'disabled' : '') + ' onclick="selectTarget(\'DISCARD_REPLACE\',\'ADITHA\')">Aditha Karikalan — Decree (costs 2 coins) [target] ★</button>' +
      '<button class="action-btn card-action-btn" onclick="selectTarget(\'GIVE_COINS\',\'MANI\')">Manimegalai — Sacrifice (give coins) [target] ★</button>' : '') +
    '</div></div>' +
    renderCharReference(G) +
    '</div>';
}

function renderCharReference(G) {
  const chars = getAllChars(G.includeExpansion);
  let rows = Object.values(chars).map(ch =>
    '<div class="char-ref-row">' +
    '<span class="char-ref-name" style="color:' + ch.color + '">' + escHtml(ch.shortName) + '</span>' +
    '<span class="char-ref-count">(×' + ch.count + ')</span>' +
    '<span class="char-ref-action">' + (ch.action ? '⚔ ' + escHtml(ch.action.desc) : '—') + '</span>' +
    '<span class="char-ref-counter">' + (ch.counter ? '🛡 Blocks: ' + ch.counter.blocks.join(', ') : '—') + '</span>' +
    '</div>'
  ).join('');
  return '<button class="char-ref-toggle" onclick="toggleRef()">Character reference ▾</button>' +
    '<div class="char-ref-panel" id="char-ref">' + rows + '</div>';
}

function toggleRef() {
  const el = document.getElementById('char-ref');
  if (el) el.classList.toggle('visible');
}

function renderForceEliminate(G) {
  const targets = G.players.filter(p => p.alive && p.seatIndex !== mySeatIndex);
  return '<div class="action-area">' +
    '<div class="warning-msg">You have 10 or more coins \u2014 you must use Coup! Pay 10 coins to eliminate one of an opponent\'s cards.</div>' +
    '<div class="action-buttons">' +
    targets.map(t => `<button class="action-btn target-btn" onclick="submitAction('COUP',null,${t.seatIndex})">${escHtml(t.name)} (${t.cardCount} cards, ${t.coins} coins)</button>`).join('') +
    '</div></div>';
}

function renderTargetSelectUI(G, myPlayer) {
  if (!pendingTargetAction) return '<div class="action-area waiting">…</div>';
  const { actionType } = pendingTargetAction;
  const targets = G.players.filter(p => {
    if (!p.alive || p.seatIndex === mySeatIndex) return false;
    if (actionType === 'KANDAMARAN_EXCHANGE' && p.cardCount < 2) return false;
    return true;
  });
  return '<div class="action-area">' +
    '<h3 style="color:#b89050;margin-bottom:10px">Select a target for ' + escHtml(actionType) + ':</h3>' +
    '<div class="action-buttons">' +
    targets.map(t => '<button class="action-btn target-btn" onclick="onTargetSelected(' + t.seatIndex + ')">' + escHtml(t.name) + ' (' + t.cardCount + ' cards, ' + t.coins + ' coins)</button>').join('') +
    '<button class="action-btn cancel-btn" onclick="cancelTargetSelect()">Cancel</button>' +
    '</div></div>';
}

function renderHumanResponseArea(G, myPlayer) {
  const pa = G.pendingAction;
  if (!pa) return '<div class="action-area waiting">…</div>';
  const actor = G.players.find(p => p.seatIndex === pa.actingPlayerId);
  const target = pa.targetPlayerId != null ? G.players.find(p => p.seatIndex === pa.targetPlayerId) : null;
  const isTarget = target && target.seatIndex === mySeatIndex;
  const actionDesc = pa.charId ? getCharName(pa.charId, G.includeExpansion) + ' (' + pa.actionType + ')' : pa.actionType;

  // Get block options for ME
  const myP = G.players.find(p => p.seatIndex === mySeatIndex);
  const blockOptions = (pa.actionType && !NON_BLOCKABLE.has(pa.actionType))
    ? getBlockersFor(pa.actionType, pa.targetPlayerId, mySeatIndex, pa.targetPlayerId != null ? G.players.find(p=>p.seatIndex===pa.targetPlayerId)?.id : null, myP?.id, G.includeExpansion)
    : [];

  const canQuestion = pa.charId && !NON_QUESTIONABLE.has(pa.actionType);

  return '<div class="action-area response-area">' +
    '<h3>' + escHtml(actor?.name || '?') + ' claims <em>' + escHtml(actionDesc) + '</em>' +
      (target ? ' → ' + (isTarget ? '<strong style="color:#ffd700">YOU</strong>' : escHtml(target.name)) : '') + '</h3>' +
    '<div class="response-buttons" style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px">' +
    '<button class="action-btn pass-btn" onclick="submitResponse(\'PASS\')">Pass — allow it</button>' +
    (canQuestion ? '<button class="action-btn question-btn" onclick="submitResponse(\'QUESTION\')">Question — challenge the claim</button>' : '') +
    blockOptions.map(bId =>
      '<button class="action-btn block-btn" onclick="submitResponse(\'BLOCK\',\'\' + bId + \'\')">Block as ' + escHtml(getCharName(bId, G.includeExpansion)) + '</button>'
    ).join('') +
    '</div></div>';
}

function renderQuestionBlockArea(G) {
  const pa = G.pendingAction;
  const blocker = G.players.find(p => p.seatIndex === pa.blockingPlayerId);
  return '<div class="action-area response-area">' +
    '<h3>' + escHtml(blocker?.name || '?') + ' claims <em>' + escHtml(getCharName(pa.blockCharId, G.includeExpansion)) + '</em> to block your action!</h3>' +
    '<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">' +
    '<button class="action-btn accept-btn" onclick="submitResponse(\'ACCEPT\')">Accept the block</button>' +
    '<button class="action-btn question-btn" onclick="submitResponse(\'QUESTION\')">Challenge the block!</button>' +
    '</div></div>';
}

// ══════════════════════════════════════════
// UI INTERACTION — TARGET SELECTION
// ══════════════════════════════════════════
function selectTarget(actionType, charId) {
  // Store pending action info, switch to local target-select UI
  pendingTargetAction = { actionType, charId };
  // Temporarily override the rendered phase for UI
  if (currentGameState) {
    const fakeState = Object.assign({}, currentGameState, { phase: 'TARGET_SELECT_UI' });
    renderGame(fakeState);
  }
}

function cancelTargetSelect() {
  pendingTargetAction = null;
  pendingTargetForExtra = null;
  if (currentGameState) renderGame(currentGameState);
}

function onTargetSelected(targetSeatIndex) {
  if (!pendingTargetAction) return;
  const { actionType, charId } = pendingTargetAction;
  pendingTargetAction = null;

  // Actions that need extra input
  if (actionType === 'GUESS') {
    // Submit action without guessedCard - server will set phase=GUESS_SELECT
    submitAction(actionType, charId, targetSeatIndex, {});
    return;
  }
  if (actionType === 'GIVE_COINS') {
    // Submit action without giveAmount - server will set phase=GIVE_COINS_SELECT
    submitAction(actionType, charId, targetSeatIndex, {});
    return;
  }
  if (actionType === 'KANDAMARAN_EXCHANGE') {
    // Need to select which of my cards to give
    pendingTargetForExtra = { actionType, charId, targetSeatIndex };
    showKandaCardSelect(targetSeatIndex);
    return;
  }

  submitAction(actionType, charId, targetSeatIndex, {});
}

function showKandaCardSelect(targetSeatIndex) {
  if (!currentGameState) return;
  const myP = currentGameState.players.find(p => p.seatIndex === mySeatIndex);
  if (!myP) return;
  const chars = getAllChars(currentGameState.includeExpansion);
  const fakeState = Object.assign({}, currentGameState, { phase: 'KANDA_CARD_UI' });
  // Inline render
  const area = document.querySelector('.human-section .action-area') || document.createElement('div');
  let html = '<div class="action-area">';
  html += '<h3 style="color:#b89050;margin-bottom:10px">Kandamaran — choose which of your cards to give:</h3>';
  html += '<div style="display:flex;gap:12px;flex-wrap:wrap">';
  html += myP.cards.map(card => renderPortraitCard(card, currentGameState.includeExpansion, {
    loseTarget: true,
    onClickFn: 'submitKandaCard('' + card.uid + '',' + targetSeatIndex + ')'
  })).join('');
  html += '</div>';
  html += '<button class="action-btn cancel-btn" style="margin-top:10px" onclick="cancelTargetSelect()">Cancel</button>';
  html += '</div>';
  area.outerHTML = html;
  // Re-render with the kanda card selection overlay
  const humanSection = document.querySelector('.human-section');
  if (humanSection) {
    const actionDiv = humanSection.querySelector('.action-area,.action-area.waiting');
    if (actionDiv) actionDiv.outerHTML = html;
  }
}

function submitKandaCard(myCardUid, targetSeatIndex) {
  pendingTargetForExtra = null;
  submitAction('KANDAMARAN_EXCHANGE', 'KANDA', targetSeatIndex, { myCardUid });
}

function cancelGuess() {
  pendingTargetForExtra = null;
  if (currentGameState) renderGame(currentGameState);
}

// ══════════════════════════════════════════
// KEEP CARDS (DRAW2)
// ══════════════════════════════════════════
function updateKeepBtn() {
  const checked = document.querySelectorAll('#keep-sel input:checked');
  const btn = document.getElementById('keep-btn');
  if (btn) btn.disabled = checked.length !== 2;
}
function confirmKeep() {
  const checked = document.querySelectorAll('#keep-sel input:checked');
  if (checked.length !== 2) return;
  submitKeepCards(Array.from(checked).map(c => c.value));
}

// ══════════════════════════════════════════
// API CALLS
// ══════════════════════════════════════════
async function submitAction(actionType, charId, targetSeatIndex, extra) {
  try {
    const res = await fetch('/api/game/action', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        roomCode: myRoomCode,
        playerId: myPlayerId,
        actionType,
        targetSeatIndex: targetSeatIndex != null ? targetSeatIndex : undefined,
        extra: extra || {}
      })
    });
    const data = await res.json();
    if (!res.ok) { showGameError(data.error); return; }
    lastVersion = -1; // force refresh
    await pollGameState();
  } catch(e) {
    showGameError('Network error: ' + e.message);
  }
}

async function submitResponse(responseType, blockCharId) {
  try {
    const res = await fetch('/api/game/response', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        roomCode: myRoomCode,
        playerId: myPlayerId,
        responseType,
        blockCharId: blockCharId || undefined
      })
    });
    const data = await res.json();
    if (!res.ok) { showGameError(data.error); return; }
    lastVersion = -1;
    await pollGameState();
  } catch(e) {
    showGameError('Network error: ' + e.message);
  }
}

// ══════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ══════════════════════════════════════════
// INIT — Check URL params for room code
// ══════════════════════════════════════════
window.onload = function() {
  // Pre-fill saved name
  const savedName = localStorage.getItem('ps_player_name');
  if (savedName) {
    document.getElementById('player-name-input').value = savedName;
  }

  // Check URL for ?room=CODE
  const params = new URLSearchParams(window.location.search);
  const urlRoom = params.get('room');
  if (urlRoom) {
    document.getElementById('room-code-input').value = urlRoom.toUpperCase();
    document.getElementById('join-form').style.display = 'block';
    // Pre-fill and focus name
    if (!savedName) {
      document.getElementById('player-name-input').focus();
    }
  }

  // Check if we have an active session for this room
  if (urlRoom) {
    const savedId = localStorage.getItem('ps_player_id_' + urlRoom.toUpperCase());
    const savedSeat = localStorage.getItem('ps_seat_index_' + urlRoom.toUpperCase());
    if (savedId && savedSeat !== null) {
      myPlayerId = savedId;
      mySeatIndex = parseInt(savedSeat, 10);
      myRoomCode = urlRoom.toUpperCase();
      // Try to rejoin
      tryRejoin();
    }
  }
};

async function tryRejoin() {
  try {
    const res = await fetch('/api/rooms/status?roomCode=' + myRoomCode + '&playerId=' + myPlayerId);
    const data = await res.json();
    if (!res.ok) return;
    isHost = data.hostPlayerId === myPlayerId;
    if (data.status === 'PLAYING') {
      enterGame();
    } else if (data.status === 'LOBBY') {
      enterLobby();
    }
  } catch(e) {}
}
